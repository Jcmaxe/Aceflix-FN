    class SnakeGameAI {

      constructor(w = 360, h = 400) {

        this.w = w;

        this.h = h;

        this.blockSize = 10;

        this.reset();

      }

      reset() {

        this.pos = { x: 20, y: 20 };

        this.foodPos = {

          x: Math.floor(Math.random() * 35),

          y: Math.floor(Math.random() * 40)

        };

        this.snakeArr = [];

        this.snakeArr.push(this.pos);

        this.snakeArr.push(this.pos);

        this.snakeArr.push(this.pos);

        this.score = 0;
        

      }

      playStep(key) {

        // Eat food condition 

        if (this.pos.x === this.foodPos.x && this.pos.y === this.foodPos.y) {

          this.#placeFood();

          this.snakeArr.push(this.pos);

          this.score++;

        }

        // Moving snake

        for (let i = this.snakeArr.length - 1; i > 0; i--) {

          this.snakeArr[i] = { ...this.snakeArr[i - 1] };


        }

        // Control snake 

        this.#move(key);

        let gameOver = "If you like this game follow me on insta _.jxmxl_ ";

        // Game Over

        if (this.#gameover()) {

          this.#placeFood();

          this.reset();

          return {

            gameOver: animate(gameOver),
            

            score: this.score

          };

        }

        return {

          gameOver: gameOver,

          score: this.score
          
          

        };

      }

      draw(ctx) {

        for (let i = 0; i < this.snakeArr.length; i++) {

          if (i == 0) ctx.fillStyle = localStorage.getItem('color');

          else ctx.fillStyle = localStorage.getItem('color');

          ctx.fillRect(this.snakeArr[i].x * this.blockSize, this.snakeArr[i].y * this.blockSize, this.blockSize, this.blockSize);

          ctx.fill();

        }

        ctx.fillStyle = localStorage.getItem('egg');

        ctx.fillRect(this.foodPos.x * this.blockSize, this.foodPos.y * this.blockSize, this.blockSize, this.blockSize);

        ctx.fill();

      }

      #placeFood() {

        this.foodPos = {

          x: Math.floor(Math.random() * 35),

          y: Math.floor(Math.random() * 40)

        };

      }

      #move(key) {

        if (key === Direction.LEFT) {

          this.pos.x -= 1;

        } else if (key === Direction.UP) {

          this.pos.y -= 1;

        } else if (key === Direction.RIGHT) {

          this.pos.x += 1;

        } else {

          this.pos.y += 1;

        }

      }

      #gameover() {

        let headPos = { ...this.snakeArr[0] };

        if (headPos.x < 0 || headPos.x > 36 || headPos.y < 0 || headPos.y > 40) {

          return true;

        }

        for (let i = 1; i < this.snakeArr.length; i++) {

          let bodyPos = { ...this.snakeArr[i] };

          if (headPos.x === bodyPos.x && headPos.y === bodyPos.y) {

            return true;

          }

        }

        return false;

      }

      getScore() {

      }
